name: Build and publish
on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build-package:
    name: Build sdist and wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          prune-cache: false

      - name: Install Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'

      - name: Build mcp-apps
        run: |
          cd mcp-app
          npm install
          npm run build:prod

      - name: Run uv sync
        run: uv sync --locked

      - name: Show environment
        run: |
          set -x
          uv run python -VV
          uv run python -m site
          ls -ld $(uv run python -c "import site; print(site.getsitepackages()[0])")
          git tag --list --sort=-refname --format='%(refname:short) %(objectname:short)'
          whoami

      - name: Build
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: artifacts
          path: dist
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-package

    environment:
      name: pypi
      url: https://pypi.org/p/linux-mcp-server

    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: artifacts
          path: dist

      - name: Show environment
        run: |
          set -x
          python -VV
          python -m site
          ls -ld $(python -c "import site; print(site.getsitepackages()[0])")
          ls -l dist/
          whoami

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0

  publish-mcp:
    name: Publish to MCP registry
    runs-on: ubuntu-latest
    needs:
      - publish-pypi

    environment:
      name: mcp

    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Publish to MCP Registry
        run: ./scripts/publish_mcp_registry.py

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  zipapp:
    name: Zipapp - ${{ matrix.python-version }} ${{ matrix.image.family }} ${{ matrix.image.arch }}
    runs-on: ${{ matrix.image.name }}
    needs:
      - create-release

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"

        image:
          - name: ubuntu-24.04
            family: linux
            arch: amd64

          - name: ubuntu-24.04-arm
            family: linux
            arch: arm64

          - name: macos-15-intel
            family: macos
            arch: amd64

          - name: macos-26
            family: macos
            arch: arm64

          - name: windows-2025
            family: windows
            arch: amd64

        exclude:
          - python-version: "3.14t"
            image:
              name: windows-2025

          # tokenizer does not have 3.14t wheels available and it fails to build on macOS.
          # Once https://github.com/huggingface/tokenizers/pull/1952 is merged,
          # the wheels should be available and this can be reenabled.
          - python-version: "3.14t"
            image:
              name: macos-15-intel

          - python-version: "3.14t"
            image:
              name: macos-26

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'

      - name: Build mcp-apps
        run: |
          cd mcp-app
          npm install
          npm run build:prod

      - name: Pin Python version
        run: uv python pin ${{ matrix.python-version }}

      - name: Build zipapp
        run: make zipapp ZIPAPP_OUTPUT=linux-mcp-server-py${{ matrix.python-version }}-${{ matrix.image.family }}-${{ matrix.image.arch }}.pyz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: linux-mcp-server-py${{ matrix.python-version }}-${{ matrix.image.family }}-${{ matrix.image.arch }}.pyz
          tag_name: ${{ github.ref_name }}
