name: Functional Tests

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-authorization:
    name: Check Authorization
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - name: Check if user is authorized
        id: check
        run: |
          AUTHORIZED=false
          if [[ "${{ github.event_name }}" == "push" ]]; then
            AUTHORIZED=true
          elif [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            if [[ "${{ github.event.pull_request.author_association }}" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
              AUTHORIZED=true
            fi
          elif [[ "${{ github.event_name }}" == "issue_comment" && "${{ github.event.issue.pull_request }}" != "" ]]; then
            if [[ "${{ github.event.comment.author_association }}" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]] && [[ "${{ github.event.comment.body }}" =~ ^/(test-functional|retest) ]]; then
              AUTHORIZED=true
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            AUTHORIZED=true
          fi
          echo "authorized=$AUTHORIZED" >> $GITHUB_OUTPUT

  tf-functional-tests:
    name: Functional Tests (Testing Farm)
    needs: check-authorization
    if: needs.check-authorization.outputs.authorized == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Determine PR Coordinates
        id: prep
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let gitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            let gitRef = context.sha;

            let prNumber;
            if (context.eventName === 'pull_request_target') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'issue_comment') {
              prNumber = context.issue.number;
            }

            if (prNumber) {
              try {
                const { data: refData } = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `pull/${prNumber}/merge`
                });
                gitRef = refData.object.sha;
                console.log(`Dereferenced pull/${prNumber}/merge to SHA: ${gitRef}`);
              } catch (error) {
                core.setFailed(`Failed to dereference merge commit for PR #${prNumber}. Ensure the PR is free of merge conflicts.`);
                return;
              }
            }

            core.exportVariable('GIT_URL', gitUrl);
            core.exportVariable('GIT_REF', gitRef);
      - name: Run TF request tests
        id: tf-request
        env:
          TESTING_FARM_API_TOKEN: ${{ secrets.TESTING_FARM_API_TOKEN }}
          ARCH: x86_64
          COMPOSE: Fedora-43
          PLAN: general
        run: |
          echo "Starting functional tests..."
          podman run --rm \
            -e TESTING_FARM_API_TOKEN="$TESTING_FARM_API_TOKEN" \
            quay.io/testing-farm/cli testing-farm request \
            --git-url "$GIT_URL" \
            --git-ref "$GIT_REF" \
            --arch "$ARCH" \
            --compose "$COMPOSE" \
            --tag "BusinessUnit=rhel_sst_lightspeed@downstream" \
            --plan "$PLAN" \
            --timeout 120
