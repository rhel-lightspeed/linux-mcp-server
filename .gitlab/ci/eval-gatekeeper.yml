# ==========================================
# EVAL WORKFLOW - SETUP
# ==========================================
setup-uv-and-mcp-apps:
  stage: setup
  image: images.paas.redhat.com/it-cloud-ocp-proxy-lib/python:3.14
  variables:
    HOME: "$CI_PROJECT_DIR"
  script:
    # Install uv
    - export PYTHONUSERBASE=$CI_PROJECT_DIR/.local
    - pip install --user uv

    # Install nvm to set up node and npm
    - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
    - \. "$HOME/.nvm/nvm.sh"
    - nvm install 24

    # Generate the bundled html file
    - cd mcp-app && npm install && npm run build:prod
  artifacts:
    paths:
      - .local/
      - mcp-app/dist/
    expire_in: 1 hour

download-secure-files:
  stage: setup
  image: registry.gitlab.com/gitlab-org/cli:latest
  script:
    - mkdir -p securefiles
    - '[ -z "$CI_SERVER_TLS_CA_FILE" ] || glab config set ca_cert "$CI_SERVER_TLS_CA_FILE" --host "$CI_SERVER_FQDN"'
    - glab auth login --job-token $CI_JOB_TOKEN --hostname $CI_SERVER_FQDN --api-protocol $CI_SERVER_PROTOCOL
    - glab -R $CI_PROJECT_PATH securefile download --all --output-dir="./securefiles"
    - cd securefiles && ls
  artifacts:
    paths:
      - securefiles/

# ==========================================
# EVAL WORKFLOW - TEMPLATES
# ==========================================
# Base template for all eval jobs
.eval-base:
  stage: eval
  image: images.paas.redhat.com/it-cloud-ocp-proxy-lib/python:3.14
  needs:
    - job: setup-uv-and-mcp-apps
      artifacts: true
    - job: download-secure-files
      artifacts: true

  before_script:
    # Add path of UV executable to PATH & Install dependencies
    - export PATH="$CI_PROJECT_DIR/.local/bin:$PATH"
    - uv sync --locked

    # Create data/ to store the evaluation result
    - mkdir -p "$CI_PROJECT_DIR/data"

    # Download Red Hat CA certifacate and combine it with root CA
    - export SSL_CERT_FILE="$CI_PROJECT_DIR/cert.pem"
    - cp /etc/ssl/certs/ca-certificates.crt $SSL_CERT_FILE
    - curl https://certs.corp.redhat.com/certs/2022-IT-Root-CA.pem >> $SSL_CERT_FILE

    # Setup environment variables for Vertex AI
    - export GOOGLE_APPLICATION_CREDENTIALS="$CI_PROJECT_DIR/securefiles/gatekeeper-eval-service-account-credential.json"
    - export VERTEXAI_PROJECT="rhel-lightspeed-650189"
    - export VERTEXAI_LOCATION="global"
  artifacts:
    paths:
      - data/
    expire_in: 1 hour

# ==========================================
# EVAL WORKFLOW - JOBS
# ==========================================

# Vertex AI
gatekeeper-eval-gpt-oss-120b:
  extends: .eval-base
  variables:
    MODEL_NAME: "gpt-oss-120b"
  script:
    - export LINUX_MCP_GATEKEEPER__MODEL="vertex_ai/openai/$MODEL_NAME-maas"
    - uv run --extra gcp eval/gatekeeper/run-eval.py --all -f json --output-all -o "$CI_PROJECT_DIR/data/$MODEL_NAME.json"

gatekeeper-eval-gemini-3.1-pro-preview:
  extends: .eval-base
  variables:
    MODEL_NAME: "gemini-3.1-pro-preview"
  script:
    - export LINUX_MCP_GATEKEEPER__MODEL="vertex_ai/$MODEL_NAME"
    - uv run --extra gcp eval/gatekeeper/run-eval.py --all -f json --output-all -o "$CI_PROJECT_DIR/data/$MODEL_NAME.json"

# Models.corp
gatekeeper-eval-models-corp-granite-4.0-h-small:
  extends: .eval-base
  variables:
    MODEL_NAME: "granite-4.0-h-small"
  script:
    - export OPENAI_API_KEY="$MODELS_CORP_GRANITE_4_0_H_SMALL_API_KEY"
    - export MODEL="ibm-granite/$MODEL_NAME"
    - ./eval/gatekeeper/run-eval-models-corp.sh --all -f json --output-all -o "$CI_PROJECT_DIR/data/$MODEL_NAME.json"
  rules:
    - if: $MODELS_CORP_GRANITE_4_0_H_SMALL_API_KEY

gatekeeper-eval-models-corp-gpt-oss-20b:
  extends: .eval-base
  variables:
    MODEL_NAME: "gpt-oss-20b"
  script:
    - export OPENAI_API_KEY="$MODELS_CORP_GPT_OSS_20B_API_KEY"
    - export MODEL="openai/$MODEL_NAME"
    - ./eval/gatekeeper/run-eval-models-corp.sh --all -f json --output-all -o "$CI_PROJECT_DIR/data/$MODEL_NAME.json"
  rules:
    - if: $MODELS_CORP_GPT_OSS_20B_API_KEY

# ==========================================
# EVAL WORKFLOW - POST-EVAL
# ==========================================
post-eval-result:
  stage: post-eval
  image: images.paas.redhat.com/it-cloud-ocp-proxy-lib/bash
  script:
    - cp eval/gatekeeper/index.html "$CI_PROJECT_DIR/index.html"

      # Create the manifest file for the rendering app to correctly gather the data
    - ls data/*.json | xargs -n1 basename > data/manifest.txt
  artifacts:
    paths:
      - data/
      - index.html
