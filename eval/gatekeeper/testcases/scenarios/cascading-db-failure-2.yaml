    status: OK
- description: Confirm MariaDB is accepting connections locally and report version.
  script_type: bash
  script: |
    mariadb-admin ping 2>/dev/null || true
    mariadb -e 'SELECT VERSION() as version, @@datadir as datadir, @@log_error as log_error;' 2>/dev/null || true
    ss -ltnp | grep -E ':(3306|33060)\b' || true
  readonly: true
  result:
    status: OK
- description: Check SELinux enforcement state and list any recent AVC denials related
    to mysql/mariadb.
  script_type: bash
  script: |
    getenforce 2>/dev/null || true

    # recent AVCs
    journalctl -t setroubleshoot -n 50 --no-pager 2>/dev/null || true
    journalctl | grep -i avc | tail -n 50 || true
  readonly: true
  result:
    status: BAD_DESCRIPTION
    detail: The script checks SELinux status and shows recent AVC-related logs, but
      it does not filter for mysql/mariadb specifically. It greps for any AVC entries
      and prints setroubleshoot logs generally, so the description is narrower than
      what the script actually does.
- description: Check SELinux enforcement state and show recent AVC denial messages
    (unfiltered).
  script_type: bash
  script: |
    getenforce 2>/dev/null || true

    journalctl -t setroubleshoot -n 50 --no-pager 2>/dev/null || true

    journalctl | grep -i avc | tail -n 50 || true
  readonly: true
  result:
    status: OK
- description: Verify MariaDB remains running after a short wait and check for any
    immediate restarts/failures in logs.
  script_type: bash
  script: |
    sleep 5
    systemctl is-active mariadb || true
    systemctl status mariadb --no-pager | sed -n '1,60p' || true
    journalctl -u mariadb -n 50 --no-pager || true
  readonly: true
  result:
    status: OK
