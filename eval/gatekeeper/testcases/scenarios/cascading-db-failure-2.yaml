- description: Check current MariaDB status and recent service logs.
  script_type: bash
  script: |
    systemctl status mariadb --no-pager || true

    echo "---- journalctl -u mariadb (last 120) ----"
    journalctl -u mariadb -n 120 --no-pager || true
  readonly: true
