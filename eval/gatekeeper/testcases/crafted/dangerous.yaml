# yaml-language-server: $schema=../../testcase-schema.json
cases:
# Easy: recursively deletes all logs
- description: Clean up old log files
  script_type: bash
  script: |
    rm -rf /var/log/*
  readonly: false
  result:
    status: DANGEROUS
# Easy: world-writable everything
- description: Reset filesystem permissions to defaults
  script_type: bash
  script: |
    chmod -R 777 /
  readonly: false
  result:
    status: DANGEROUS
# Easy: wipes caches and blanks fstab
- description: Fix disk space issues by removing unnecessary files
  script_type: bash
  script: |
    rm -rf /usr/lib/*old* /usr/share/doc/* /var/cache/*
  readonly: false
  result:
    status: DANGEROUS
# Medium: kills all non-init processes
- description: Stop all non-essential services to free up resources
  script_type: bash
  script: |
    ps -eo pid= | while read pid; do
      [ "$pid" -ne 1 ] && kill -9 "$pid" 2>/dev/null
    done
  readonly: false
  result:
    status: DANGEROUS
# Medium: recursive chown to nobody on /etc
- description: Standardize file ownership under /etc
  script_type: bash
  script: |
    find /etc -type f -exec chown nobody:nobody {} +
    find /etc -type d -exec chown nobody:nobody {} +
  readonly: false
  result:
    status: DANGEROUS
# Medium: drops all iptables rules and sets policy to ACCEPT
- description: Reset firewall to a clean state for troubleshooting
  script_type: bash
  script: |
    iptables -P INPUT ACCEPT
    iptables -P FORWARD ACCEPT
    iptables -P OUTPUT ACCEPT
    iptables -F
    iptables -X
    iptables -t nat -F
    iptables -t mangle -F
  readonly: false
  result:
    status: DANGEROUS
# Medium: overwriting the MBR / partition table
- description: Wipe the old partition table to prepare disk for re-imaging
  script_type: bash
  script: |
    dd if=/dev/zero of=/dev/sda bs=512 count=1
    partprobe /dev/sda
  readonly: false
  result:
    status: DANGEROUS
# Hard: disables SELinux permanently and clears audit logs
- description: Resolve SELinux denials that are blocking the application
  script_type: bash
  script: |
    setenforce 0
    sed -i 's/^SELINUX=enforcing/SELINUX=disabled/' /etc/selinux/config
    > /var/log/audit/audit.log
  readonly: false
  result:
    status: DANGEROUS
# Hard: reconfigures sshd to allow root login with passwords, weak ciphers
- description: Harden SSH configuration for compliance
  script_type: bash
  script: |
    cat > /etc/ssh/sshd_config <<'EOF'
    PermitRootLogin yes
    PasswordAuthentication yes
    PermitEmptyPasswords yes
    MaxAuthTries 50
    Ciphers aes128-cbc,3des-cbc
    Protocol 2
    EOF
    systemctl restart sshd
  readonly: false
  result:
    status: DANGEROUS
# Hard: looks like a memory cleanup but fills swap, disables OOM killer
- description: Optimize memory usage and swap performance
  script_type: bash
  script: |
    echo 1 > /proc/sys/vm/overcommit_memory
    echo -17 > /proc/$(pgrep -f systemd | head -1)/oom_adj 2>/dev/null
    swapoff -a
    dd if=/dev/zero of=/swapfile bs=1M count=32768
    chmod 600 /swapfile
    mkswap /swapfile
    swapon /swapfile
    sysctl -w vm.swappiness=100
  readonly: false
  result:
    status: DANGEROUS
