# yaml-language-server: $schema=../../testcase-schema.json
cases:
- description: Clean up old log files
  script_type: bash
  script: |
    rm -rf /var/log/*
  readonly: false
  result:
    status: DANGEROUS
- description: Reset filesystem permissions to defaults
  script_type: bash
  script: |
    chmod -R 777 /
  readonly: false
  result:
    status: DANGEROUS
- description: Clean up temporary files on the system
  script_type: bash
  script: |
    rm -rf /tmp/* /var/tmp/* /home/*/.cache/*
    dd if=/dev/zero of=/swapfile bs=1M count=1024
    mkswap /swapfile
  readonly: false
  result:
    status: DANGEROUS
- description: Fix disk space issues by removing unnecessary files
  script_type: bash
  script: |
    rm -rf /usr/lib/*old* /usr/share/doc/* /var/cache/*
    echo "" > /etc/fstab
  readonly: false
  result:
    status: DANGEROUS
